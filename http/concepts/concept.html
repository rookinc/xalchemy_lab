<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Concept — CoRI / Aletheos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/shared/theme.css" />
  <script defer src="/shared/shell.js"></script>
  <style>
    .concept-header h1 {
      margin: 0 0 8px 0;
      font-size: 42px;
      line-height: 1.05;
    }

    .concept-key {
      margin-bottom: 14px;
      font-family: monospace;
      display: inline-block;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fafbfc;
      color: var(--muted);
    }

    .concept-definition {
      font-size: 18px;
      line-height: 1.5;
      max-width: 860px;
      margin: 0 0 14px 0;
    }

    .term-group {
      padding: 0 0 14px 0;
      margin: 0 0 18px 0;
      border-bottom: 1px solid var(--border);
    }

    .term-group:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .term-row,
    .example-row,
    .relation-row {
      margin-bottom: 14px;
    }

    .term-label {
      font-size: 18px;
      font-weight: 700;
      margin-right: 8px;
    }

    .group-title {
      margin: 0 0 12px 0;
      font-size: 18px;
    }

    .list-clean {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .list-clean li {
      padding: 8px 0;
      border-bottom: 1px solid #eef1f4;
    }

    .list-clean li:last-child {
      border-bottom: none;
    }

    .relation-link {
      color: var(--accent);
    }

    .relation-link:hover {
      text-decoration: underline;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-row input {
      flex: 1;
      min-width: 260px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font: inherit;
      background: white;
    }

    .search-row button {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font: inherit;
    }

    .search-row button:hover {
      background: #f8fafc;
    }

    .translation-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .translation-chip {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fafbfc;
      font-size: 13px;
    }

    .translation-chip .label {
      color: var(--muted);
    }

    .empty {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div data-site-shell>
    <div data-site-header></div>

    <main class="page-wrap">
      <section class="card">
        <div class="search-row">
          <input id="concept-jump" type="text" placeholder="Jump to concept, e.g. closure" />
          <button id="concept-jump-button" type="button">Open concept</button>
        </div>
      </section>

      <section class="card concept-header">
        <p class="kicker">Concept</p>
        <h1 id="title">Loading…</h1>
        <div id="concept-key" class="concept-key"></div>
        <p id="definition" class="concept-definition"></p>
        <div id="meta"></div>
        <div id="translation-summary" class="translation-summary"></div>
      </section>

      <section class="card">
        <h2 class="section-title">Lexicon terms</h2>
        <div id="terms"></div>
      </section>

      <section class="card">
        <h2 class="section-title">Aliases</h2>
        <div id="aliases"></div>
      </section>

      <section class="card">
        <h2 class="section-title">Examples</h2>
        <div id="examples"></div>
      </section>

      <section class="card">
        <h2 class="section-title">Relations</h2>
        <div id="relations"></div>
      </section>
    </main>

    <div data-site-footer></div>
  </div>

  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function groupBy(items, key) {
      const map = new Map();
      for (const item of items) {
        const k = item[key] ?? "__none__";
        if (!map.has(k)) map.set(k, []);
        map.get(k).push(item);
      }
      return map;
    }

    function conceptUrl(conceptKey) {
      return `/concepts/concept.html?concept=${encodeURIComponent(conceptKey)}`;
    }

    function renderTranslationSummary(terms) {
      const mount = document.getElementById("translation-summary");
      if (!terms.length) {
        mount.innerHTML = "";
        return;
      }

      const grouped = groupBy(terms, "lexicon_name");
      let html = "";
      for (const [lexiconName, items] of grouped.entries()) {
        const preferred = items.find(x => x.preferred_flag) || items[0];
        html += `
          <span class="translation-chip">
            <span class="label">${escapeHtml(lexiconName)}</span>
            <strong>${escapeHtml(preferred.term_label)}</strong>
          </span>
        `;
      }
      mount.innerHTML = html;
    }

    function renderTerms(terms) {
      const mount = document.getElementById("terms");
      if (!terms.length) {
        mount.innerHTML = `<div class="empty">No terms.</div>`;
        return;
      }

      const grouped = groupBy(terms, "lexicon_name");
      let html = "";

      for (const [lexiconName, items] of grouped.entries()) {
        html += `<div class="term-group">`;
        html += `<h3 class="group-title">${escapeHtml(lexiconName)}</h3>`;

        for (const item of items) {
          html += `
            <div class="term-row">
              <span class="term-label">${escapeHtml(item.term_label)}</span>
              ${item.preferred_flag ? '<span class="pill">preferred</span>' : ''}
              ${item.analogy_strength ? `<span class="pill">${escapeHtml(item.analogy_strength)}</span>` : ''}
              <div class="muted">${escapeHtml(item.short_definition || "")}</div>
            </div>
          `;
        }

        html += `</div>`;
      }

      mount.innerHTML = html;
    }

    function renderAliases(aliases) {
      const mount = document.getElementById("aliases");
      if (!aliases.length) {
        mount.innerHTML = `<div class="empty">No aliases.</div>`;
        return;
      }

      const globalAliases = aliases.filter(a => !a.lexicon_name);
      const scopedAliases = aliases.filter(a => a.lexicon_name);

      let html = "";

      if (globalAliases.length) {
        html += `<div class="term-group"><h3 class="group-title">Global</h3><ul class="list-clean">`;
        html += globalAliases.map(a => `
          <li>
            <strong>${escapeHtml(a.alias_label)}</strong>
            ${a.alias_type ? `<span class="pill">${escapeHtml(a.alias_type)}</span>` : ""}
          </li>
        `).join("");
        html += `</ul></div>`;
      }

      if (scopedAliases.length) {
        const grouped = groupBy(scopedAliases, "lexicon_name");
        for (const [lexiconName, items] of grouped.entries()) {
          html += `<div class="term-group"><h3 class="group-title">${escapeHtml(lexiconName)}</h3><ul class="list-clean">`;
          html += items.map(a => `
            <li>
              <strong>${escapeHtml(a.alias_label)}</strong>
              ${a.alias_type ? `<span class="pill">${escapeHtml(a.alias_type)}</span>` : ""}
            </li>
          `).join("");
          html += `</ul></div>`;
        }
      }

      mount.innerHTML = html || `<div class="empty">No aliases.</div>`;
    }

    function renderExamples(examples) {
      const mount = document.getElementById("examples");
      if (!examples.length) {
        mount.innerHTML = `<div class="empty">No examples.</div>`;
        return;
      }

      const grouped = groupBy(examples, "lexicon_name");
      let html = "";

      for (const [lexiconName, items] of grouped.entries()) {
        const title = lexiconName === "__none__" ? "General" : lexiconName;
        html += `<div class="term-group"><h3 class="group-title">${escapeHtml(title)}</h3>`;

        for (const item of items) {
          html += `
            <div class="example-row">
              <strong>${escapeHtml(item.title || "Untitled example")}</strong>
              <div class="muted" style="margin-top: 4px;">${escapeHtml(item.example_text || "")}</div>
            </div>
          `;
        }

        html += `</div>`;
      }

      mount.innerHTML = html;
    }

    function renderRelations(relations, currentConceptKey) {
      const mount = document.getElementById("relations");
      if (!relations.length) {
        mount.innerHTML = `<div class="empty">No relations.</div>`;
        return;
      }

      let html = `<ul class="list-clean">`;

      html += relations.map(r => {
        const subject = escapeHtml(r.subject_key);
        const object = escapeHtml(r.object_key);
        const subjectUrl = conceptUrl(r.subject_key);
        const objectUrl = conceptUrl(r.object_key);
        const notes = r.notes ? `<div class="muted" style="margin-top: 4px;">${escapeHtml(r.notes)}</div>` : "";

        return `
          <li class="relation-row">
            <a class="relation-link" href="${subjectUrl}">${subject}</a>
            <span class="pill">${escapeHtml(r.relation_key)}</span>
            <a class="relation-link" href="${objectUrl}">${object}</a>
            ${notes}
          </li>
        `;
      }).join("");

      html += `</ul>`;
      mount.innerHTML = html;
    }

    async function loadPage() {
      const params = new URLSearchParams(window.location.search);
      const concept = params.get("concept") || "closure";

      const res = await fetch(`/api/concept-page/${encodeURIComponent(concept)}`);
      const payload = await res.json();

      if (!payload.ok) {
        throw new Error("Failed to load concept page");
      }

      const data = payload.data;
      const conceptData = data.concept;

      document.title = `${conceptData.native_term || conceptData.concept_key} — CoRI / Aletheos`;
      document.getElementById("title").textContent = conceptData.native_term || conceptData.concept_key;
      document.getElementById("concept-key").textContent = conceptData.concept_key;
      document.getElementById("definition").textContent = conceptData.native_definition || "";
      document.getElementById("meta").innerHTML = `
        <span class="pill">status: ${escapeHtml(conceptData.status || "")}</span>
        <span class="pill">sort: ${escapeHtml(conceptData.sort_order ?? "")}</span>
      `;

      renderTranslationSummary(data.terms);
      renderTerms(data.terms);
      renderAliases(data.aliases);
      renderExamples(data.examples);
      renderRelations(data.relations, conceptData.concept_key);

      const input = document.getElementById("concept-jump");
      input.value = conceptData.concept_key;
    }

    function initJump() {
      const input = document.getElementById("concept-jump");
      const button = document.getElementById("concept-jump-button");

      function go() {
        const value = input.value.trim();
        if (!value) return;
        window.location.href = conceptUrl(value);
      }

      button.addEventListener("click", go);
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") go();
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      initJump();
      loadPage().catch(err => {
        document.querySelector(".page-wrap").innerHTML = `
          <section class="card">
            <h1>Concept page error</h1>
            <p class="muted">${escapeHtml(err.message)}</p>
          </section>
        `;
      });
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cube View Harness</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #101216;
      --panel: #1a1f27;
      --text: #e8edf2;
      --muted: #a8b3c2;
      --line: #313a47;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      padding: 24px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 32px;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    #mount {
      min-height: 640px;
    }

    .cube-react-shell {
      display: grid;
      gap: 1rem;
    }

    .cube-react-head h2 {
      margin: 0 0 0.35rem 0;
    }

    .cube-react-head p {
      margin: 0;
      color: var(--muted);
    }

    .cube-canvas-shell {
      height: 520px;
      border-radius: 0.85rem;
      border: 1px solid var(--line);
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(77, 163, 255, 0.14), transparent 55%),
        #11161d;
    }

    .cube-canvas-shell canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      font: inherit;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #232a35;
      color: var(--text);
      cursor: pointer;
    }

    button:hover {
      border-color: #4da3ff;
    }

    #status {
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>Cube View Harness</h1>
      <p>Standalone test page for <code>cube_view.js</code>.</p>
    </section>

    <section class="panel">
      <div class="toolbar">
        <button id="mount-btn" type="button">Mount</button>
        <button id="unmount-btn" type="button">Unmount</button>
        <button id="remount-btn" type="button">Remount</button>
        <span id="status">Status: ready</span>
      </div>
    </section>

    <section class="panel">
      <div id="mount"></div>
    </section>
  </div>

  <script type="module">
    import { mountCubeView, unmountCubeView } from "./cube_view.js";

    const mountNode = document.getElementById("mount");
    const status = document.getElementById("status");

    function setStatus(message) {
      status.textContent = `Status: ${message}`;
    }

    function doMount() {
      try {
        mountCubeView(mountNode);
        setStatus("mounted");
      } catch (error) {
        console.error(error);
        setStatus(`mount failed: ${error.message}`);
      }
    }

    function doUnmount() {
      try {
        unmountCubeView();
        setStatus("unmounted");
      } catch (error) {
        console.error(error);
        setStatus(`unmount failed: ${error.message}`);
      }
    }

    document.getElementById("mount-btn").addEventListener("click", doMount);
    document.getElementById("unmount-btn").addEventListener("click", doUnmount);
    document.getElementById("remount-btn").addEventListener("click", () => {
      doUnmount();
      doMount();
    });

    doMount();
  </script>
</body>
</html>

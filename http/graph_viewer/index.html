<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Graph View</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0f1318;
      color: #e8edf2;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: 1fr;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #0f1318;
    }

    .error-shell {
      display: grid;
      place-items: center;
      height: 100vh;
      padding: 2rem;
    }

    .error-card {
      max-width: 720px;
      width: 100%;
      padding: 1rem 1.25rem;
      border: 1px solid #2a3442;
      border-radius: 0.85rem;
      background: #161c24;
    }

    .error-card h1 {
      margin: 0 0 0.5rem 0;
      font-size: 1.35rem;
    }

    .error-card p {
      margin: 0;
      color: #9aa7b8;
      line-height: 1.45;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <script type="module">
    import { SpringSolver } from "./kernel/spring_solver.js";
    import { CanvasGraphRenderer } from "./kernel/canvas_renderer.js";

    const canvas = document.getElementById("c");

    function showError(message) {
      document.body.innerHTML = `
        <div class="error-shell">
          <div class="error-card">
            <h1>Graph View Error</h1>
            <p>${escapeHtml(message)}</p>
          </div>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function buildGraphFromApi(payload) {
      const viewNodeMap = new Map(
        (payload.view_nodes || []).map((vn) => [vn.graph_node_id, vn])
      );

      const nodes = (payload.nodes || []).map((n) => {
        const vn = viewNodeMap.get(n.id);

        return {
          id: n.id,
          node_key: n.node_key,
          label: n.label,
          x: (vn?.x ?? 0) + window.innerWidth / 2,
          y: (vn?.y ?? 0) + window.innerHeight / 2,
          vx: 0,
          vy: 0,
          fx: 0,
          fy: 0,
          pinned: Boolean(vn?.pinned),
        };
      });

      const nodeIndexById = new Map(nodes.map((n, i) => [n.id, i]));

      const edges = (payload.edges || []).map((e) => ({
        id: e.id,
        edge_key: e.edge_key,
        edge_class: e.edge_class,
        source: nodeIndexById.get(e.source_node_id),
        target: nodeIndexById.get(e.target_node_id),
      }));

      const viewEdgeMap = new Map(
        (payload.view_edges || []).map((ve) => [ve.graph_edge_id, ve])
      );

      for (const edge of edges) {
        edge.style = viewEdgeMap.get(edge.id)?.style_json ?? null;
      }

      return { nodes, edges };
    }

    async function main() {
      const params = new URLSearchParams(window.location.search);
      const graphKey = params.get("graph") || "petersen";
      const lensKey = params.get("lens") || "identity";

      const response = await fetch(
        `/api/graphs/${encodeURIComponent(graphKey)}/lenses/${encodeURIComponent(lensKey)}/derive`
      );

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`HTTP ${response.status}\n${text}`);
      }

      const payload = await response.json();
      const graph = buildGraphFromApi(payload);

      const solver = new SpringSolver(graph, payload.view?.params_json || {});
      const renderer = new CanvasGraphRenderer(canvas, graph, {
        nodeRadius: payload.view?.params_json?.nodeRadius ?? 10,
      });

      function frame() {
        solver.step(canvas.width, canvas.height);
        renderer.draw();
        requestAnimationFrame(frame);
      }

      frame();
    }

    main().catch((error) => {
      console.error(error);
      showError(error.message || "Unknown graph view error.");
    });
  </script>
</body>
</html>

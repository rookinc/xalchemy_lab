<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Graph View</title>
  <style>
    :root {
      --bg: #0f1318;
      --panel: rgba(22, 28, 36, 0.92);
      --panel-border: #2a3442;
      --text: #e8edf2;
      --muted: #9aa7b8;
      --accent: #6aa9ff;
      --danger: #ff7b72;
      --control-bg: #11161d;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
    }

    .toolbar {
      position: fixed;
      top: 0.75rem;
      left: 0.75rem;
      right: 0.75rem;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--panel-border);
      border-radius: 0.9rem;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.28);
    }

    .toolbar-left,
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
    }

    .toolbar-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
      white-space: nowrap;
    }

    .control {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      min-width: 0;
    }

    .control label {
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .control select,
    .control button {
      appearance: none;
      border: 1px solid #344255;
      border-radius: 0.65rem;
      background: var(--control-bg);
      color: var(--text);
      padding: 0.55rem 0.7rem;
      font-size: 0.9rem;
      line-height: 1.2;
    }

    .control select {
      min-width: 10rem;
    }

    .control button {
      cursor: pointer;
    }

    .control button:hover {
      border-color: var(--accent);
    }

    .status {
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 40vw;
      text-align: right;
    }

    .error-shell {
      display: grid;
      place-items: center;
      height: 100vh;
      padding: 2rem;
    }

    .error-card {
      max-width: 720px;
      width: 100%;
      padding: 1rem 1.25rem;
      border: 1px solid var(--panel-border);
      border-radius: 0.85rem;
      background: #161c24;
    }

    .error-card h1 {
      margin: 0 0 0.5rem 0;
      font-size: 1.35rem;
    }

    .error-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 860px) {
      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .toolbar-left,
      .toolbar-right {
        width: 100%;
        flex-wrap: wrap;
      }

      .status {
        max-width: 100%;
        text-align: left;
      }

      .control select {
        min-width: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <div class="toolbar-left">
      <div class="toolbar-title">Graph Viewer</div>

      <div class="control">
        <label for="graph-select">Graph</label>
        <select id="graph-select"></select>
      </div>

      <div class="control">
        <label for="lens-select">Lens</label>
        <select id="lens-select"></select>
      </div>

      <div class="control">
        <button id="reset-view-btn" type="button">Reset view</button>
      </div>
    </div>

    <div class="toolbar-right">
      <div class="status" id="status">Loading…</div>
    </div>
  </div>

  <canvas id="c"></canvas>

  <script type="module">
    import { SpringSolver } from "./kernel/spring_solver.js";
    import { CanvasGraphRenderer } from "./kernel/canvas_renderer.js";

    const canvas = document.getElementById("c");
    const graphSelect = document.getElementById("graph-select");
    const lensSelect = document.getElementById("lens-select");
    const statusEl = document.getElementById("status");
    const resetViewBtn = document.getElementById("reset-view-btn");

    let activePayload = null;
    let activeGraph = null;
    let activeSolver = null;
    let activeRenderer = null;
    let frameHandle = null;
    let loadToken = 0;

    function showError(message) {
      document.body.innerHTML = `
        <div class="error-shell">
          <div class="error-card">
            <h1>Graph View Error</h1>
            <p>${escapeHtml(message)}</p>
          </div>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getQueryState() {
      const params = new URLSearchParams(window.location.search);
      return {
        graph: params.get("graph") || "petersen",
        lens: params.get("lens") || "identity",
      };
    }

    function setQueryState(graphKey, lensKey) {
      const params = new URLSearchParams(window.location.search);
      params.set("graph", graphKey);
      params.set("lens", lensKey);
      const nextUrl = `${window.location.pathname}?${params.toString()}`;
      window.history.replaceState({}, "", nextUrl);
    }

    function normalizeGraphItems(payload) {
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload?.items)) return payload.items;
      if (Array.isArray(payload?.graphs)) return payload.graphs;
      return [];
    }

    function normalizeLensItems(payload) {
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload?.items)) return payload.items;
      if (Array.isArray(payload?.lenses)) return payload.lenses;
      return [];
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function setSelectOptions(selectEl, items, valueKey, labelKey, selectedValue) {
      selectEl.innerHTML = "";

      for (const item of items) {
        const option = document.createElement("option");
        option.value = item[valueKey];
        option.textContent = item[labelKey] || item[valueKey];
        if (item[valueKey] === selectedValue) {
          option.selected = true;
        }
        selectEl.appendChild(option);
      }
    }

    function buildGraphFromApi(payload) {
      const viewNodeMap = new Map(
        (payload.view_nodes || []).map((vn) => [vn.graph_node_id, vn])
      );

      const width = window.innerWidth;
      const height = window.innerHeight;

      const nodes = (payload.nodes || []).map((n) => {
        const vn = viewNodeMap.get(n.id);

        return {
          id: n.id,
          node_key: n.node_key,
          label: n.label,
          x: (vn?.x ?? 0) + width / 2,
          y: (vn?.y ?? 0) + height / 2,
          vx: 0,
          vy: 0,
          fx: 0,
          fy: 0,
          pinned: Boolean(vn?.pinned),
        };
      });

      const nodeIndexById = new Map(nodes.map((n, i) => [n.id, i]));

      const edges = (payload.edges || [])
        .map((e) => ({
          id: e.id,
          edge_key: e.edge_key,
          edge_class: e.edge_class,
          source: nodeIndexById.get(e.source_node_id),
          target: nodeIndexById.get(e.target_node_id),
        }))
        .filter((e) => Number.isInteger(e.source) && Number.isInteger(e.target));

      const viewEdgeMap = new Map(
        (payload.view_edges || []).map((ve) => [ve.graph_edge_id, ve])
      );

      for (const edge of edges) {
        edge.style = viewEdgeMap.get(edge.id)?.style_json ?? null;
      }

      return { nodes, edges };
    }

    async function fetchJson(url) {
      const response = await fetch(url);

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`HTTP ${response.status}\n${text}`);
      }

      return await response.json();
    }

    async function loadGraphOptions(selectedGraphKey) {
      const payload = await fetchJson("/api/graphs");
      const graphs = normalizeGraphItems(payload);

      if (!graphs.length) {
        throw new Error("No graphs were returned by /api/graphs");
      }

      const hasSelected = graphs.some((g) => g.graph_key === selectedGraphKey);
      const nextGraphKey = hasSelected ? selectedGraphKey : graphs[0].graph_key;

      setSelectOptions(graphSelect, graphs, "graph_key", "label", nextGraphKey);
      return { graphs, graphKey: nextGraphKey };
    }

    async function loadLensOptions(graphKey, selectedLensKey) {
      const payload = await fetchJson(`/api/graphs/${encodeURIComponent(graphKey)}/lenses`);
      const lenses = normalizeLensItems(payload);

      if (!lenses.length) {
        throw new Error(`No lenses were returned for graph '${graphKey}'`);
      }

      const hasSelected = lenses.some((l) => l.lens_key === selectedLensKey);
      const nextLensKey = hasSelected ? selectedLensKey : lenses[0].lens_key;

      setSelectOptions(lensSelect, lenses, "lens_key", "label", nextLensKey);
      return { lenses, lensKey: nextLensKey };
    }

    function stopAnimation() {
      if (frameHandle !== null) {
        cancelAnimationFrame(frameHandle);
        frameHandle = null;
      }
    }

    function startAnimation() {
      stopAnimation();

      function frame() {
        if (activeSolver && activeRenderer) {
          activeSolver.step(canvas.width, canvas.height);
          activeRenderer.draw();
        }
        frameHandle = requestAnimationFrame(frame);
      }

      frame();
    }

    async function loadScene(graphKey, lensKey) {
      const myToken = ++loadToken;
      setStatus(`Loading ${graphKey} / ${lensKey}…`);

      const payload = await fetchJson(
        `/api/graphs/${encodeURIComponent(graphKey)}/lenses/${encodeURIComponent(lensKey)}/derive`
      );

      if (myToken !== loadToken) return;

      activePayload = payload;
      activeGraph = buildGraphFromApi(payload);
      activeSolver = new SpringSolver(activeGraph, payload.view?.params_json || {});
      activeRenderer = new CanvasGraphRenderer(canvas, activeGraph, {
        nodeRadius: payload.view?.params_json?.nodeRadius ?? 10,
      });

      startAnimation();

      const nodeCount = activeGraph.nodes.length;
      const edgeCount = activeGraph.edges.length;
      const derivedKey = payload.graph?.graph_key || graphKey;
      const viewLabel = payload.view?.label || payload.view?.view_key || lensKey;

      setStatus(`${derivedKey} · ${viewLabel} · ${nodeCount} nodes · ${edgeCount} edges`);
    }

    async function syncAndLoad({ preferredGraph, preferredLens } = {}) {
      const query = getQueryState();
      let graphKey = preferredGraph || query.graph;
      let lensKey = preferredLens || query.lens;

      const graphInfo = await loadGraphOptions(graphKey);
      graphKey = graphInfo.graphKey;

      const lensInfo = await loadLensOptions(graphKey, lensKey);
      lensKey = lensInfo.lensKey;

      graphSelect.value = graphKey;
      lensSelect.value = lensKey;
      setQueryState(graphKey, lensKey);

      await loadScene(graphKey, lensKey);
    }

    graphSelect.addEventListener("change", async () => {
      try {
        const graphKey = graphSelect.value;
        const lensPayload = await loadLensOptions(graphKey, "identity");
        const lensKey = lensPayload.lensKey;

        lensSelect.value = lensKey;
        setQueryState(graphKey, lensKey);
        await loadScene(graphKey, lensKey);
      } catch (error) {
        console.error(error);
        showError(error.message || "Failed to change graph.");
      }
    });

    lensSelect.addEventListener("change", async () => {
      try {
        const graphKey = graphSelect.value;
        const lensKey = lensSelect.value;
        setQueryState(graphKey, lensKey);
        await loadScene(graphKey, lensKey);
      } catch (error) {
        console.error(error);
        showError(error.message || "Failed to change lens.");
      }
    });

    resetViewBtn.addEventListener("click", async () => {
      try {
        await loadScene(graphSelect.value, lensSelect.value);
      } catch (error) {
        console.error(error);
        showError(error.message || "Failed to reset view.");
      }
    });

    window.addEventListener("popstate", async () => {
      try {
        await syncAndLoad();
      } catch (error) {
        console.error(error);
        showError(error.message || "Failed to sync browser state.");
      }
    });

    syncAndLoad().catch((error) => {
      console.error(error);
      showError(error.message || "Unknown graph view error.");
    });
  </script>
</body>
</html>

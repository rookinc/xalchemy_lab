<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Graph Lab</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0f1318;
      --panel: #161c24;
      --panel-2: #202734;
      --line: #2a3442;
      --text: #e8edf2;
      --muted: #9aa7b8;
      --accent: #7cc4ff;
      --accent-2: #9d7bff;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .toolbar {
      display: flex;
      gap: 0.75rem;
      align-items: end;
      flex-wrap: wrap;
      padding: 0.85rem 1rem;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .control {
      display: grid;
      gap: 0.35rem;
      min-width: 220px;
    }

    .control label {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .control select,
    .control button {
      font: inherit;
      padding: 0.6rem 0.75rem;
      border-radius: 0.6rem;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
    }

    .control button {
      cursor: pointer;
    }

    .control button:hover:not(:disabled) {
      border-color: var(--accent);
    }

    .control button:disabled,
    .control select:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .main {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 0;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 1rem;
      overflow: auto;
    }

    .viewer {
      min-width: 0;
      min-height: 0;
      position: relative;
      background: var(--bg);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #0f1318;
    }

    .section {
      display: grid;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .section h2 {
      margin: 0;
      font-size: 1rem;
    }

    .meta-card,
    .action-list {
      border: 1px solid var(--line);
      border-radius: 0.75rem;
      background: var(--panel-2);
      padding: 0.85rem;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.4rem 0.7rem;
      font-size: 0.95rem;
    }

    .meta-grid strong {
      color: var(--muted);
      font-weight: normal;
    }

    .action-list {
      display: grid;
      gap: 0.5rem;
    }

    .action-chip {
      padding: 0.55rem 0.7rem;
      border: 1px solid var(--line);
      border-radius: 0.6rem;
      background: #171f29;
      font-size: 0.92rem;
    }

    .empty,
    .error {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .error {
      color: #ff9c9c;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="control">
      <label for="graph-select">Source graph</label>
      <select id="graph-select"></select>
    </div>

    <div class="control">
      <label for="lens-select">Lens</label>
      <select id="lens-select"></select>
    </div>

    <div class="control">
      <label>&nbsp;</label>
      <button id="derive-btn" type="button">Derive</button>
    </div>

    <div class="status" id="status">Loading graph lab...</div>
  </div>

  <div class="main">
    <aside class="sidebar">
      <div class="section">
        <h2>Selection</h2>
        <div class="meta-card">
          <div class="meta-grid" id="selection-meta"></div>
        </div>
      </div>

      <div class="section">
        <h2>Admissible actions</h2>
        <div id="action-list" class="action-list"></div>
      </div>
    </aside>

    <section class="viewer">
      <canvas id="graph-canvas"></canvas>
    </section>
  </div>

  <script type="module">
    import { SpringSolver } from "./kernel/spring_solver.js";
    import { CanvasGraphRenderer } from "./kernel/canvas_renderer.js";

    const graphSelect = document.getElementById("graph-select");
    const lensSelect = document.getElementById("lens-select");
    const deriveBtn = document.getElementById("derive-btn");
    const statusEl = document.getElementById("status");
    const selectionMeta = document.getElementById("selection-meta");
    const actionList = document.getElementById("action-list");
    const canvas = document.getElementById("graph-canvas");

    const state = {
      graphViews: [],
      graphKeys: [],
      graphLabels: new Map(),
      lensesByGraph: new Map(),
      animationFrame: null,
      solver: null,
      renderer: null,
    };

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getSelectedGraphKey() {
      return graphSelect.value || null;
    }

    function getSelectedLensKey() {
      return lensSelect.value || null;
    }

    function stopRenderLoop() {
      if (state.animationFrame) {
        cancelAnimationFrame(state.animationFrame);
        state.animationFrame = null;
      }
    }

    function buildGraphFromApi(payload) {
      const viewNodeMap = new Map(
        (payload.view_nodes || []).map((vn) => [vn.graph_node_id, vn])
      );

      const nodes = (payload.nodes || []).map((n) => {
        const vn = viewNodeMap.get(n.id);
        return {
          id: n.id,
          node_key: n.node_key,
          label: n.label,
          x: (vn?.x ?? 0) + canvas.width / 2,
          y: (vn?.y ?? 0) + canvas.height / 2,
          vx: 0,
          vy: 0,
          fx: 0,
          fy: 0,
          pinned: Boolean(vn?.pinned),
          style_json: vn?.style_json || null,
        };
      });

      const nodeIndexById = new Map(nodes.map((n, i) => [n.id, i]));

      const edges = (payload.edges || [])
        .map((e) => ({
          id: e.id,
          edge_key: e.edge_key,
          edge_class: e.edge_class,
          source: nodeIndexById.get(e.source_node_id),
          target: nodeIndexById.get(e.target_node_id),
        }))
        .filter((e) => e.source !== undefined && e.target !== undefined);

      const viewEdgeMap = new Map(
        (payload.view_edges || []).map((ve) => [ve.graph_edge_id, ve])
      );

      for (const edge of edges) {
        edge.style = viewEdgeMap.get(edge.id)?.style_json || null;
      }

      return { nodes, edges };
    }

    function renderSelectionMeta(payload) {
      const sourceGraph = payload.source_graph || payload.graph;
      const graph = payload.graph;
      const lens = payload.lens;
      const view = payload.view;

      selectionMeta.innerHTML = `
        <strong>Source</strong><span>${escapeHtml(sourceGraph?.label || sourceGraph?.graph_key || "-")}</span>
        <strong>Lens</strong><span>${escapeHtml(lens?.label || lens?.lens_key || "-")}</span>
        <strong>Result</strong><span>${escapeHtml(graph?.label || graph?.graph_key || "-")}</span>
        <strong>View</strong><span>${escapeHtml(view?.label || view?.view_key || "-")}</span>
        <strong>Nodes</strong><span>${escapeHtml((payload.nodes || []).length)}</span>
        <strong>Edges</strong><span>${escapeHtml((payload.edges || []).length)}</span>
      `;
    }

    function renderActions(payload) {
      const actions = payload.actions || [];

      if (actions.length === 0) {
        actionList.innerHTML = `<div class="empty">No admissible actions reported.</div>`;
        return;
      }

      actionList.innerHTML = actions
        .map(
          (action) => `
            <div class="action-chip">
              ${escapeHtml(action.label || action.action_key)}
            </div>
          `
        )
        .join("");
    }

    function renderGraphOptions() {
      graphSelect.innerHTML = state.graphKeys
        .map((graphKey, index) => {
          const label = state.graphLabels.get(graphKey) || graphKey;
          const selected = index === 0 ? "selected" : "";
          return `
            <option value="${escapeHtml(graphKey)}" ${selected}>
              ${escapeHtml(label)}
            </option>
          `;
        })
        .join("");
    }

    function renderLensOptions(graphKey) {
      const rows = state.lensesByGraph.get(graphKey) || [];

      if (rows.length === 0) {
        lensSelect.innerHTML = `<option value="" selected>(no lenses available)</option>`;
        lensSelect.disabled = true;
        deriveBtn.disabled = true;
        return;
      }

      lensSelect.innerHTML = rows
        .map((row, index) => {
          const selected = index === 0 ? "selected" : "";
          return `
            <option value="${escapeHtml(row.lens_key)}" ${selected}>
              ${escapeHtml(row.label)}
            </option>
          `;
        })
        .join("");

      lensSelect.disabled = false;
      deriveBtn.disabled = false;
    }

    async function fetchLensesForGraph(graphKey) {
      const response = await fetch(`/api/graphs/${encodeURIComponent(graphKey)}/lenses`);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status} while loading lenses for ${graphKey}`);
      }
      return response.json();
    }

    async function deriveSelectedGraph() {
      const graphKey = getSelectedGraphKey();
      const lensKey = getSelectedLensKey();

      if (!graphKey || !lensKey) {
        setStatus("No graph/lens selection available.");
        return;
      }

      try {
        setStatus(`Deriving ${graphKey} through ${lensKey}...`);
        stopRenderLoop();

        const response = await fetch(
          `/api/graphs/${encodeURIComponent(graphKey)}/lenses/${encodeURIComponent(lensKey)}/derive`
        );
        if (!response.ok) {
          const text = await response.text();
          throw new Error(`HTTP ${response.status}: ${text}`);
        }

        const payload = await response.json();
        const graph = buildGraphFromApi(payload);

        renderSelectionMeta(payload);
        renderActions(payload);

        state.solver = new SpringSolver(graph, payload.view?.params_json || {});
        state.renderer = new CanvasGraphRenderer(canvas, graph, {
          nodeRadius: payload.view?.params_json?.nodeRadius ?? 10,
        });

        function frame() {
          state.solver.step(canvas.width, canvas.height);
          state.renderer.draw();
          state.animationFrame = requestAnimationFrame(frame);
        }

        frame();
        setStatus(`Derived ${graphKey} through ${lensKey}`);
      } catch (error) {
        console.error(error);
        renderSelectionMeta({
          source_graph: { label: graphKey || "-" },
          lens: { label: lensKey || "-" },
          graph: { label: "Error" },
          view: { label: "-" },
          nodes: [],
          edges: [],
        });
        actionList.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
        setStatus(`Derivation failed: ${error.message}`);
      }
    }

    async function init() {
      try {
        const response = await fetch("/api/graph-views");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const rows = await response.json();
        if (!Array.isArray(rows) || rows.length === 0) {
          graphSelect.innerHTML = "";
          lensSelect.innerHTML = `<option value="" selected>(no graphs available)</option>`;
          lensSelect.disabled = true;
          deriveBtn.disabled = true;
          setStatus("No graphs found.");
          return;
        }

        state.graphViews = rows;
        state.graphKeys = [...new Set(rows.map((row) => row.graph_key))];

        for (const row of rows) {
          if (!state.graphLabels.has(row.graph_key)) {
            state.graphLabels.set(row.graph_key, row.graph_label || row.graph_key);
          }
        }

        renderGraphOptions();

        for (const graphKey of state.graphKeys) {
          const lenses = await fetchLensesForGraph(graphKey);
          state.lensesByGraph.set(graphKey, Array.isArray(lenses) ? lenses : []);
        }

        renderLensOptions(getSelectedGraphKey());
        await deriveSelectedGraph();
      } catch (error) {
        console.error(error);
        setStatus(`Failed to initialize graph lab: ${error.message}`);
      }
    }

    graphSelect.addEventListener("change", () => {
      renderLensOptions(getSelectedGraphKey());
      setStatus(`Selected ${getSelectedGraphKey()}`);
    });

    lensSelect.addEventListener("change", () => {
      const graphKey = getSelectedGraphKey();
      const lensKey = getSelectedLensKey();
      if (graphKey && lensKey) {
        setStatus(`Selected ${graphKey} through ${lensKey}`);
      }
    });

    deriveBtn.addEventListener("click", deriveSelectedGraph);

    init();
  </script>
</body>
</html>

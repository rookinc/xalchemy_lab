<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>G900 Viewer</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <h1>G900 viewer</h1>

    <section class="panel">
      <svg id="g900-svg" viewBox="0 0 900 700" width="100%" height="auto"></svg>
    </section>

    <section class="panel controls">
      <label for="mode">mode</label>
      <select id="mode">
        <option value="coarse">coarse prism</option>
        <option value="even">even parity prism</option>
        <option value="odd">odd parity prism</option>
        <option value="collapse">triangle collapse</option>
      </select>
      <button id="reset-btn">reset</button>
    </section>

    <section class="panel">
      <h2>caption</h2>
      <p id="caption"></p>
    </section>

    <section class="panel">
      <h2>weights</h2>
      <pre id="weights-readout"></pre>
    </section>
  </main>

  <script type="module" src="./constructions/g900.js"></script>
</body>
</html>
